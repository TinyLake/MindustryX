name: PR Desktop Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-desktop-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.12
          cache-read-only: true
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: yes

      - name: Set env
        run: |
          git config --global user.email "ci@noreply.example.com"
          git config --global user.name "github_actions"

      - name: Prepare sources
        run: |
          git submodule update --init --depth=10
          ./scripts/applyPatches.sh

      - name: Build desktop distribution
        working-directory: work
        run: ./gradlew --parallel desktop:dist

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: MindustryX-desktop-pr-${{ github.event.pull_request.number }}
          path: work/desktop/build/libs/Mindustry.jar
          if-no-files-found: error
