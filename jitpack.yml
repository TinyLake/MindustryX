jdk:
  - openjdk17
install:
  - git version && git status
  - git submodule deinit -f Arc work || true #重建submodule,jitpack有问题
  - git submodule update --init --recursive --depth 10
#  - cd work/ && git fetch origin v145.1 && git reset --hard FETCH_HEAD && cd ..
  - git config --global user.email "ci@noreply.example.com"
  - git config --global user.name "jitpack"
  - bash scripts/applyPatches.sh
  - cd work/ && ./gradlew -Parchash=$VERSION -PpackageVersion=$VERSION publishToMavenLocal && cd ..
  - cd Arc/ && ./gradlew -PpackageVersion=$VERSION publishToMavenLocal && cd ..